version: '3.9'
services:
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 4000
      CORS_ORIGIN: http://localhost:8080
      PYTHON_SERVICE_URL: http://ml-service:8000
    depends_on:
      - ml-service
    ports:
      - "4000:4000"
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
    depends_on:
      - backend
    ports:
      - "8080:8080"
