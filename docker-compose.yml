version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: fairsight-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  ml-service:
    build: 
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: fairsight-ml-service
    ports:
      - "8000:8000"
    environment:
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./ml-service:/app
    depends_on:
      - mongodb

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fairsight-backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGO_URI=mongodb://mongodb:27017/fairsight
      - ML_SERVICE_URL=http://ml-service:8000
      - CORS_ORIGIN=http://localhost:5173,http://localhost:3000,http://localhost:8080
    depends_on:
       - mongodb
       - ml-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fairsight-frontend
    ports:
      - "5173:5173"
      - "8080:8080"
    environment:
      - VITE_API_URL=http://localhost:4000/api/v1
    depends_on:
      - backend

volumes:
  mongodb_data:
